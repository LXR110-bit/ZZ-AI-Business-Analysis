  <text x="510" y="636" class="box-sub" style="font-size:10.5px">• 无 Pydantic 输出契约</text>
  <text x="510" y="652" class="box-sub" style="font-size:10.5px">• 完整 review_gate 兜底</text>
  <text x="510" y="668" class="box-sub" style="font-size:10.5px">• 慢但兼容开放式问题</text>
  <text x="510" y="684" class="box-sub" style="font-size:10px;fill:#7c2d92">→ 未来把命中场景抽成 workflow skill</text>
