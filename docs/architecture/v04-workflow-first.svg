  </defs>
  <style>text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#1a1a1a}.title{font-size:20px;font-weight:700}.subtitle{font-size:12px;fill:#666}.box-title{font-size:13px;font-weight:600}.box-sub{font-size:11px;fill:#666}.flow-line{fill:none;stroke:#666;stroke-width:1.5}.thin-line{fill:none;stroke:#888;stroke-width:1;stroke-dasharray:4 3}.assert-line{fill:none;stroke:#c53030;stroke-width:1.5}.label{font-size:10px;fill:#666}.band-title{font-size:12px;font-weight:600;fill:#444}</style>
  <text x="470" y="30" text-anchor="middle" class="title">ZZ-AI 数据分析架构 v0.4 · workflow-first</text>
  <text x="470" y="50" text-anchor="middle" class="subtitle">workflow 打底 · agent 只在 spawn 节点做判断 · codex exec 仅 fallback</text>
