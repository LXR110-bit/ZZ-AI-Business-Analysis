name: workflow-local-imports-tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest pandas openpyxl pydantic

      - name: Run workflow/data-tools tests
        env:
          PYTHONPATH: mcp_servers/data_tools/src:${{ github.workspace }}
        run: |
          python -m pytest -q \
            mcp_servers/data_tools/tests/test_email_reader.py \
            skills/workflows/机型周数据/tests/test_local_imports.py \
            skills/workflows/经营分析概览/tests/test_dashboard_adapter.py
