server {
    listen 80;
    server_name _;

    access_log /opt/log/model-tag-monitor/nginx/access.log;
    error_log  /opt/log/model-tag-monitor/nginx/error.log warn;

    root /opt/soft/model-tag-monitor/app/model-tag-monitor/public;
    index index.html;

    location = /health {
        add_header Content-Type application/json;
        return 200 '{"ok":true,"service":"model-tag-monitor"}';
    }

    location = /data/dashboard.json {
        alias /opt/data/model-tag-monitor/current/dashboard.json;
        default_type application/json;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }


    location /api/ {
        proxy_pass http://127.0.0.1:8848;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1h;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Keep the legacy API private by default. If an emergency smoke test needs it,
    # run curl on the host against http://127.0.0.1:8848 instead of exposing 8848.
}
